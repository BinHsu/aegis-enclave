# ElasticMQ configuration — local SQS-compatible queue for development.
# This file is mounted into the elasticmq container at /opt/elasticmq.conf.
#
# Creates the aegis-enclave-primes queue on startup so the app and worker
# can use it without a separate queue-creation step.
#
# SQS visibility timeout = 90s (1.5 × worker compute budget of 60s).
# Matches queue.py: _VISIBILITY_TIMEOUT_S = 90.

include classpath("application.conf")

queues {
  aegis-enclave-primes {
    defaultVisibilityTimeout = 90 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
}

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  # Required for AWS SDK path-style addressing.
  sqs-limits = strict
}

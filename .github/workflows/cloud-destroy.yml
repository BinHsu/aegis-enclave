name: Cloud Destroy (governed-org teardown)

# ADR-0051 — teardown is gated by the SAME SCP as apply: iam:DetachRolePolicy /
# DeleteRolePolicy are denied for non-gh-tf principals, so the human `make
# cloud-down` cannot fully tear down the enclave's IAM in the governed org. This
# workflow runs `terraform destroy` as gh-tf-apply-enclave.
#
# Manual dispatch ONLY — destroying real infrastructure is a deliberate act, not
# a side effect of a push. Requires typing "destroy" to confirm. A forker runs
# the end-to-end local `make cloud-down` instead.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down the cloud stack'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

# Share the apply lock group — never destroy while an apply is in flight.
concurrency:
  group: cloud-apply
  cancel-in-progress: false

env:
  # 1.14.8 — see cloud-apply.yml (regions-map cross-variable validation needs >= 1.9).
  TF_VERSION: "1.14.8"

jobs:
  destroy:
    name: Terraform destroy (gh-tf-apply-enclave)
    runs-on: ubuntu-latest
    # Gate on the role var (skip on forks) AND the typed confirmation.
    if: ${{ vars.AWS_TF_APPLY_ROLE_ARN != '' && inputs.confirm == 'destroy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy tfvars from secret
        working-directory: terraform
        run: |
          umask 077
          cat > deploy.auto.tfvars <<'EOFVARS'
          ${{ secrets.AWS_DEPLOY_TFVARS }}
          EOFVARS
          test -s deploy.auto.tfvars || { echo "::error::AWS_DEPLOY_TFVARS secret is empty or unset"; exit 1; }

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
          role-session-name: aegis-enclave-destroy-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Same S3 backend as cloud-apply (destroy must read the SAME state).
      - name: Configure remote state backend
        working-directory: terraform
        run: |
          test -n "${{ vars.AWS_TF_STATE_BUCKET }}" || { echo "::error::repo variable AWS_TF_STATE_BUCKET is not set"; exit 1; }
          cat > backend.tf <<'EOF'
          terraform {
            backend "s3" {
              bucket         = "${{ vars.AWS_TF_STATE_BUCKET }}"
              key            = "main/terraform.tfstate"
              region         = "${{ vars.AWS_REGION || 'eu-central-1' }}"
              dynamodb_table = "aegis-enclave-tflock"
              encrypt        = true
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      # terraform DeleteRepository fails on a non-empty ECR repo, so drain the
      # images first (the CI analogue of cloud-down.sh's drain). Repo names follow
      # the name_prefix convention (aegis-enclave / aegis-enclave-<peer>); the peer
      # region comes from the regions map in deploy.auto.tfvars (ADR-0042).
      - name: Drain ECR images
        run: |
          set -uo pipefail
          REGION="${{ vars.AWS_REGION || 'eu-central-1' }}"
          SECONDARY=$( ( grep -oE '"[a-z]{2}-[a-z]+-[0-9]+"[[:space:]]*=[[:space:]]*\{' terraform/deploy.auto.tfvars 2>/dev/null || true ) | ( grep -oE '[a-z]{2}-[a-z]+-[0-9]+' || true ) | ( grep -vx "$REGION" || true ) | head -1 )
          drain() {
            local region="$1" repo="$2" ids
            ids=$(aws ecr list-images --repository-name "$repo" --region "$region" --query 'imageIds[*]' --output json 2>/dev/null || echo '[]')
            if [ "$ids" != "[]" ] && [ -n "$ids" ]; then
              aws ecr batch-delete-image --repository-name "$repo" --region "$region" --image-ids "$ids" --output text >/dev/null 2>&1 || true
              echo "drained $region/$repo"
            else
              echo "$region/$repo already empty or gone"
            fi
          }
          drain "$REGION" "aegis-enclave"
          [ -n "$SECONDARY" ] && drain "$SECONDARY" "aegis-enclave-${SECONDARY}"

      - name: Terraform destroy
        working-directory: terraform
        # -refresh=false: a re-run after a partially-failed destroy would
        # otherwise re-evaluate now-dead module outputs and crash with "Invalid
        # for_each argument" (the ECS module's for_each over container
        # definitions). Compute the destroy purely from cached state — matches
        # the same fix already in scripts/ts_teardown.sh.
        run: terraform destroy -auto-approve -input=false -no-color -lock-timeout=5m -refresh=false

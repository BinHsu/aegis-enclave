name: Cloud Apply (governed-org deploy)

# ADR-0051 — governed-org deploy path. In the aegis org the SCP denies IAM
# create/teardown to every principal except gh-tf-*, so the human `make
# cloud-up` cannot create the enclave's IAM. This workflow runs the
# IAM-creating `terraform apply` as the gh-tf-apply-enclave OIDC role (which the
# SCP glob permits). A forker in an ungoverned account ignores this workflow and
# runs the end-to-end local `make cloud-up` instead.
#
# GATED on the AWS_TF_APPLY_ROLE_ARN repo VARIABLE. Unset (fork / pre-bootstrap)
# => the job skips. Set it from `terraform/bootstrap` output
# gha_terraform_apply_role_arn once the role is seeded (one break-glass).
#
# OPERATOR PREREQUISITES (the human-in-the-loop split, ADR-0051 — CI does the
# IAM-creating apply, the operator does the human/secret-bearing steps):
#   1. terraform/bootstrap applied + the S3 backend in terraform/main.tf enabled
#      (ADR-0025) — CI apply needs durable remote state, not local state.
#   2. VPN cert PKI generated + imported into ACM (private keys never touch CI).
#   3. Container image built + pushed to ECR (image_tag pinned).
#   4. The deploy tfvars (cert ARNs, image_tag, IPAM pool ids per ADR-0050,
#      route53 zone, alarm email) supplied via the AWS_DEPLOY_TFVARS secret —
#      never committed (CLAUDE.md section 5).
# After apply, the operator runs VPN + smoke + evidence locally.

on:
  # Deliberate manual deploy ONLY. The enclave stack carries real hourly cost
  # (ECS Fargate / Client VPN / ElastiCache Serverless), so it is NOT
  # auto-applied on every push — unlike the always-cheap landing-zone fabric
  # that the sibling aegis-platform-aws push-applies. This refines ADR-0051's
  # "apply on push to main" for the case-study apply-then-destroy cost posture;
  # switch to a `push:` trigger if you want GitOps auto-apply in a sustained fork.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Never let two applies (or an apply + a destroy) race the S3 state lock.
concurrency:
  group: cloud-apply
  cancel-in-progress: false

env:
  TF_VERSION: "1.5.0"

jobs:
  apply:
    name: Terraform apply (gh-tf-apply-enclave)
    runs-on: ubuntu-latest
    # Skip for forks / pre-bootstrap: the governed-org role isn't provisioned.
    if: ${{ vars.AWS_TF_APPLY_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble deploy tfvars from secret
        working-directory: terraform
        run: |
          umask 077
          cat > deploy.auto.tfvars <<'EOFVARS'
          ${{ secrets.AWS_DEPLOY_TFVARS }}
          EOFVARS
          test -s deploy.auto.tfvars || { echo "::error::AWS_DEPLOY_TFVARS secret is empty or unset"; exit 1; }

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
          role-session-name: aegis-enclave-apply-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Generate the S3 remote-state backend at init time (gitignored), so
      # main.tf stays backend-less and a forker's local `make cloud-up`
      # (-backend=false) is unaffected. State bucket from the AWS_TF_STATE_BUCKET
      # repo variable; lock table is the fixed aegis-enclave-tflock (ADR-0025/0051).
      - name: Configure remote state backend
        working-directory: terraform
        run: |
          test -n "${{ vars.AWS_TF_STATE_BUCKET }}" || { echo "::error::repo variable AWS_TF_STATE_BUCKET is not set"; exit 1; }
          cat > backend.tf <<'EOF'
          terraform {
            backend "s3" {
              bucket         = "${{ vars.AWS_TF_STATE_BUCKET }}"
              key            = "main/terraform.tfstate"
              region         = "${{ vars.AWS_REGION || 'eu-central-1' }}"
              dynamodb_table = "aegis-enclave-tflock"
              encrypt        = true
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      # Replicates cloud-up.sh phases 5+6 in CI (the operator does phase 4 cert
      # PKI locally; this runs as gh-tf-apply-enclave). A pre-deps -target apply
      # breaks the ECR<->image chicken-and-egg, then build+push the image (tag =
      # the deployed commit's short SHA), then the full apply.
      - name: Pre-deps apply + image build/push + full apply
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
        run: |
          set -euo pipefail
          TF="terraform -chdir=terraform"
          REGION="$AWS_REGION"

          # Peer region from the regions map (ADR-0042); empty if single-region.
          SECONDARY_REGION=$( ( grep -oE '"[a-z]{2}-[a-z]+-[0-9]+"[[:space:]]*=[[:space:]]*\{' terraform/deploy.auto.tfvars 2>/dev/null || true ) | ( grep -oE '[a-z]{2}-[a-z]+-[0-9]+' || true ) | ( grep -vx "$REGION" || true ) | head -1 )
          echo "platform=$REGION peer=${SECONDARY_REGION:-<none>}"

          # Phase 5a: pre-deps (VPC + ECR + DynamoDB) so docker push + the ECS
          # task defs in the full apply have something to reference.
          PRE=(-target=module.region_platform.module.vpc -target=module.region_platform.module.ecr -target=aws_dynamodb_table.executions)
          [ -n "$SECONDARY_REGION" ] && PRE+=(-target='module.region_peer[0].module.vpc' -target='module.region_peer[0].module.ecr')
          $TF apply "${PRE[@]}" -auto-approve -input=false -no-color -lock-timeout=5m

          ECR_URL=$($TF output -raw ecr_repository_url)
          ECR_REPO=$(printf '%s' "$ECR_URL" | sed -E 's|.*/([^/]+)$|\1|')
          IMAGE_TAG=$(git rev-parse --short=8 HEAD)
          printf 'image_tag = "%s"\n' "$IMAGE_TAG" > terraform/image-tag.auto.tfvars
          echo "ECR=$ECR_URL repo=$ECR_REPO tag=$IMAGE_TAG"

          # Phase 5b: build + push to primary ECR (skip if the tag already
          # exists = identical content, avoids the ECR IMMUTABLE conflict).
          aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ECR_URL" >/dev/null
          if aws ecr describe-images --region "$REGION" --repository-name "$ECR_REPO" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "primary ECR already has $IMAGE_TAG - skip build/push"
          else
            docker build --platform linux/amd64 --provenance=false --sbom=false -t "$ECR_URL:$IMAGE_TAG" .
            docker push "$ECR_URL:$IMAGE_TAG"
          fi

          # Phase 5c: replicate the image to the peer ECR (peer ECS pulls it).
          if [ -n "$SECONDARY_REGION" ]; then
            SEC_ECR=$($TF output -raw secondary_ecr_repository_url 2>/dev/null || echo "")
            if [ -n "$SEC_ECR" ]; then
              SEC_REPO=$(printf '%s' "$SEC_ECR" | sed -E 's|.*/([^/]+)$|\1|')
              if aws ecr describe-images --region "$SECONDARY_REGION" --repository-name "$SEC_REPO" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
                echo "peer ECR already has $IMAGE_TAG - skip"
              else
                aws ecr get-login-password --region "$SECONDARY_REGION" | docker login --username AWS --password-stdin "$SEC_ECR" >/dev/null
                docker tag "$ECR_URL:$IMAGE_TAG" "$SEC_ECR:$IMAGE_TAG"
                docker push "$SEC_ECR:$IMAGE_TAG"
              fi
            fi
          fi

          # Phase 6: full apply (the remaining ~70 resources: Client VPN, ALB,
          # ECS services, Valkey, SQS, IAM, autoscaling, VPC endpoints).
          $TF apply -auto-approve -input=false -no-color -lock-timeout=5m

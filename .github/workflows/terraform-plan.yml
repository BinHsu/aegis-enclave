# PR-time Terraform plan via GitHub Actions OIDC.
#
# What it does:
#   - On every PR that touches terraform/, run `terraform plan` against the
#     example tfvars and post the output as a PR comment.
#   - Read-only — the role assumed has `ReadOnlyAccess` (managed policy)
#     plus tightly-scoped read+write access to the state bucket and lock
#     table only. Cannot apply, cannot mutate any case-study resources.
#
# Activation:
#   The job is GATED on the `AWS_TF_PLAN_ROLE_ARN` repository VARIABLE.
#   If unset (Phase 1 / pre-bootstrap), the job skips with an annotation
#   pointing to terraform/bootstrap/. Once the operator has run the
#   bootstrap module and published the role ARN as a repo variable
#   (`gh variable set AWS_TF_PLAN_ROLE_ARN ...`), the job activates.
#
# See ADR-0026 for the design rationale and trust-scope analysis.

name: Terraform Lint + Plan

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

# OIDC requires id-token: write. pull-requests: write so we can comment.
# All other permissions stay at their default least-privileged setting.
permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + format gate — ungated (no AWS creds, no role ARN needed), so it
  # runs on every terraform/** change (PR + push to main), including Phase 1
  # / pre-bootstrap. tfsec runs locally via the pre-commit hook + `make
  # tf-scan`; CI carries the actively-maintained linter (tflint) as the
  # remote backstop. Solo main-based workflow (no PR) is still gated here.
  lint:
    name: Terraform lint + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive

  plan:
    name: Terraform plan (read-only)
    runs-on: ubuntu-latest
    # Skip if the role hasn't been provisioned yet (Phase 1 default).
    # Once `AWS_TF_PLAN_ROLE_ARN` is set as a repo variable, this gate opens.
    # pull_request only — the plan posts a PR comment, which has no target on
    # a push to main (the lint job above is what covers push-to-main).
    if: ${{ vars.AWS_TF_PLAN_ROLE_ARN != '' && github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
          role-session-name: aegis-enclave-pr-plan-${{ github.run_id }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        id: plan
        run: |
          # Phase-1 fallback: plan against the example tfvars (placeholder ARNs).
          # Phase-2: operator can override TFVARS_FILE in the workflow inputs
          # to point at a SSM-loaded file or similar.
          set -o pipefail
          terraform plan \
            -no-color \
            -lock-timeout=5m \
            -var-file=terraform.tfvars.example \
            2>&1 | tee plan.txt
          # Capture exit code through the pipefail above so failures still
          # propagate; tee shouldn't mask non-zero terraform exits.

      - name: Post plan output as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'terraform/plan.txt';
            let plan = '(no plan output captured — check the job log)';
            if (fs.existsSync(path)) {
              plan = fs.readFileSync(path, 'utf8');
            }
            // GitHub PR comment hard limit is 65536 chars; reserve headroom.
            const MAX = 60000;
            const truncated = plan.length > MAX
              ? plan.substring(0, MAX) + '\n\n... (truncated; see workflow log for full output)'
              : plan;
            const body = [
              '## Terraform plan (PR-time, read-only)',
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              truncated,
              '```',
              '</details>',
              '',
              '_Generated by `.github/workflows/terraform-plan.yml`. ' +
              'See ADR-0026 for trust scope and limitations._',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

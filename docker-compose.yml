# Local-stack demo composition — VPN-gated cloud microservice template
# with async worker + distributed cache.
#
# Services:
#   dynamodb-local — Amazon DynamoDB Local (in-memory, sharedDb mode)
#   ddb-bootstrap  — One-shot table-create task (profiles: bootstrap — DDB
#                    has no auto-DDL on container start, so this profile
#                    runs `aws dynamodb create-table` once and exits)
#   valkey         — Valkey 7 (Redis-compatible cache; local parity for ElastiCache Serverless)
#   elasticmq      — ElasticMQ (SQS-compatible local queue; parity for AWS SQS)
#   minio          — MinIO (S3-compatible local object store; parity for S3 — ADR-0048)
#   minio-bootstrap — One-shot bucket-create task (profiles: bootstrap — MinIO
#                    has no auto-create on start, so this profile runs
#                    `mc mb` once and exits)
#   app            — FastAPI prime service (no host port published)
#   worker         — SQS consumer loop (reuses app image, different CMD)
#   bootstrap      — One-shot cache pre-warm task (profiles: bootstrap — manual trigger only)
#   wg-gateway     — WireGuard server (UDP/51820 published to host, dual-homed)
#   test-client    — Verification harness with curl + wireguard-tools + Python (sympy oracle)
#
# Networks (segmented per #13):
#   edge     — host-visible surface; wg-gateway:51820/udp is the ONLY port
#              published to the host; test-client sits here.
#   internal — `internal: true` (no outbound NAT, no cross-network routing
#              except via wg-gateway); app / worker / data tier live here.
#
# Verification (per ADR-0013): smoke.sh runs from test-client (edge-only),
# brings up the WireGuard tunnel, and reaches app:8000 ONLY through the gateway
# — same shape as the cloud Client VPN -> internal ALB path.
# Negative test (per ADR-0014): host-side `curl localhost:8000` must FAIL
# because the only published port on the host is 51820/udp on the gateway.

services:
  # ─── Data tier ───────────────────────────────────────────────────────────────

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: enclave-ddb
    restart: unless-stopped
    # -inMemory  : volatile in-memory store (no disk volume; matches PoC scope)
    # -sharedDb  : single shared backing store regardless of region/credential
    #              namespace, so app/worker/bootstrap clients all see the same
    #              table without juggling per-credential isolation.
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    healthcheck:
      # DynamoDB Local has no /health endpoint; root path returns HTTP 400 with
      # a JSON error body when the JVM is up — that's enough to prove liveness.
      # The 2.5.2 image dropped wget and now ships only curl; use curl without
      # --fail so any HTTP response (incl. 400) counts as alive — only a connection
      # refusal or timeout fails.
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 2 http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    # Intentionally NOT publishing port 8000 — DynamoDB Local is reachable only
    # inside the Docker network, satisfying the "no direct access" property of
    # the brief.

  ddb-bootstrap:
    # One-shot table-create task. DynamoDB has no auto-DDL on container
    # start — tables must be created via the API. This service runs
    # `aws dynamodb create-table` once and exits. Profiles guard prevents
    # accidental start on `docker compose up`; invoke manually:
    #   docker compose --profile bootstrap run --rm ddb-bootstrap
    image: amazon/aws-cli:2.17.0
    container_name: enclave-ddb-bootstrap
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_DEFAULT_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: local
      # Aligned with MINIO_ROOT_PASSWORD (>= 8 chars per MinIO requirement);
      # dynamodb-local + elasticmq accept any non-empty credential so this
      # single value works across all three local emulators.
      AWS_SECRET_ACCESS_KEY: local12345
    # create-table is idempotent-ish: subsequent runs return ResourceInUseException.
    # We tolerate that (|| true) so re-running the bootstrap profile is safe.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws dynamodb create-table \
          --table-name aegis-enclave-executions \
          --attribute-definitions AttributeName=execution_id,AttributeType=S \
          --key-schema AttributeName=execution_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          || true
    profiles:
      - bootstrap
    networks:
      - internal

  valkey:
    image: valkey/valkey:7-alpine
    container_name: enclave-valkey
    restart: unless-stopped
    # No host port published — reachable only within the Docker network.
    # Cloud parity: ElastiCache Serverless Valkey (engine=valkey) per strategy.md § D.
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  minio:
    # S3-compatible local object store. Cloud parity: real S3 buckets per
    # region with bidirectional CRR (ADR-0048). Holds the gzipped primes-
    # list payloads; the DDB row carries only the s3_key pointer.
    # No host port published — reachable only inside the internal Docker
    # network (alongside app / worker / data tier).
    image: minio/minio:latest
    container_name: enclave-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: local
      # MinIO requires the root password to be >= 8 chars; matches the
      # AWS_SECRET_ACCESS_KEY=local12345 we hand to boto3 below.
      MINIO_ROOT_PASSWORD: local12345
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - internal

  minio-bootstrap:
    # One-shot bucket-create task. MinIO has no auto-create on start —
    # buckets must be made via the API or `mc mb`. Profiles guard
    # prevents accidental start on `docker compose up`; invoke manually:
    #   docker compose --profile bootstrap run --rm minio-bootstrap
    # (Pattern mirrors `ddb-bootstrap`.)
    image: minio/mc:latest
    container_name: enclave-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    # `mc alias set` configures `mc` with the local MinIO credentials;
    # `mc mb --ignore-existing` is idempotent so re-running the profile
    # is safe (no error if the bucket already exists).
    command:
      - |
        mc alias set localminio http://minio:9000 local local12345
        mc mb --ignore-existing localminio/aegis-enclave-results-eu-central-1
    profiles:
      - bootstrap
    networks:
      - internal

  elasticmq:
    # SQS-compatible local queue. Pinned to 1.6.x per strategy.md § D.
    # Creates the queue on first boot via the embedded config below.
    image: softwaremill/elasticmq-native:1.6.2
    container_name: enclave-elasticmq
    restart: unless-stopped
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro
    # Port 9324 is the SQS-compatible HTTP API used by the boto3 client.
    # Not published to host — accessed only from within the Docker network.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9324/?Action=ListQueues || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ─── Application tier ─────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enclave-app
    restart: unless-stopped
    depends_on:
      dynamodb-local:
        condition: service_healthy
      valkey:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DYNAMODB_TABLE_NAME: aegis-enclave-executions
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # SQS / Valkey endpoints — overridden to local containers in dev.
      AWS_SQS_ENDPOINT_URL: http://elasticmq:9324
      # boto3 per-service S3 endpoint (#9.8 family); points at the local
      # MinIO emulator. ADR-0048: s3_store reads this to talk to MinIO.
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_DEFAULT_REGION: eu-central-1
      # AWS_REGION drives the bucket name in s3_store._bucket_for() so
      # the local container reads/writes the same bucket the bootstrap
      # task created.
      AWS_REGION: eu-central-1
      # Dummy credentials required by boto3 even when talking to ElasticMQ /
      # DynamoDB Local.
      AWS_ACCESS_KEY_ID: local
      # Aligned with MINIO_ROOT_PASSWORD (>= 8 chars per MinIO requirement);
      # dynamodb-local + elasticmq accept any non-empty credential so this
      # single value works across all three local emulators.
      AWS_SECRET_ACCESS_KEY: local12345
      VALKEY_ENDPOINT: valkey:6379
      VALKEY_TLS: "false"
      # Backpressure: 5 × worker_count = 5 × 1 = 5 (strategy.md § D)
      BACKPRESSURE_FACTOR: "5"
      WORKER_COUNT: "1"
    networks:
      - internal
    # Intentionally NOT publishing port 8000 — the API is reachable only
    # through the VPN gateway (or, for verification, from the test-client
    # container which is on the internal network).

  worker:
    # Reuses the app image with a different entrypoint — no separate Dockerfile.
    # The SQS consumer loop polls ElasticMQ and processes prime-computation jobs.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enclave-worker
    restart: unless-stopped
    depends_on:
      dynamodb-local:
        condition: service_healthy
      valkey:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DYNAMODB_TABLE_NAME: aegis-enclave-executions
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_SQS_ENDPOINT_URL: http://elasticmq:9324
      # boto3 per-service S3 endpoint (#9.8 family); points at the local
      # MinIO emulator. ADR-0048: s3_store reads this to talk to MinIO.
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_DEFAULT_REGION: eu-central-1
      # AWS_REGION drives the bucket name in s3_store._bucket_for() so
      # the local container reads/writes the same bucket the bootstrap
      # task created.
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: local
      # Aligned with MINIO_ROOT_PASSWORD (>= 8 chars per MinIO requirement);
      # dynamodb-local + elasticmq accept any non-empty credential so this
      # single value works across all three local emulators.
      AWS_SECRET_ACCESS_KEY: local12345
      VALKEY_ENDPOINT: valkey:6379
      VALKEY_TLS: "false"
    # Override the Dockerfile CMD to start the worker consumer loop.
    command: ["python", "-m", "prime_service.worker"]
    # Override the Dockerfile HEALTHCHECK — the worker process doesn't listen on
    # HTTP, so the app-image healthcheck (curl /health) is not applicable.
    # A simple process-alive check via kill -0 is not easily done in compose;
    # instead we disable the image healthcheck and rely on restart: unless-stopped
    # to recover a crashed worker. The SQS visibility timeout handles redelivery.
    healthcheck:
      disable: true
    # SIGTERM grace: 60s gives in-flight compute up to the SIGALRM deadline.
    # SQS visibility timeout (90s) handles redelivery if the worker is killed
    # before acking — so we can be aggressive here without losing messages.
    stop_grace_period: 60s
    networks:
      - internal

  bootstrap:
    # One-shot cache pre-warm task. NOT started by default — run manually:
    #   docker compose run --rm bootstrap
    # Profiles guard prevents accidental start on `docker compose up`.
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      valkey:
        condition: service_healthy
      dynamodb-local:
        condition: service_healthy
    environment:
      DYNAMODB_TABLE_NAME: aegis-enclave-executions
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_SQS_ENDPOINT_URL: http://elasticmq:9324
      # boto3 per-service S3 endpoint (#9.8 family); points at the local
      # MinIO emulator. ADR-0048: s3_store reads this to talk to MinIO.
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_DEFAULT_REGION: eu-central-1
      # AWS_REGION drives the bucket name in s3_store._bucket_for() so
      # the local container reads/writes the same bucket the bootstrap
      # task created.
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: local
      # Aligned with MINIO_ROOT_PASSWORD (>= 8 chars per MinIO requirement);
      # dynamodb-local + elasticmq accept any non-empty credential so this
      # single value works across all three local emulators.
      AWS_SECRET_ACCESS_KEY: local12345
      VALKEY_ENDPOINT: valkey:6379
      VALKEY_TLS: "false"
    command: ["python", "-m", "prime_service.bootstrap"]
    profiles:
      - bootstrap
    networks:
      - internal

  # ─── VPN + verification tier ──────────────────────────────────────────────

  wg-gateway:
    image: linuxserver/wireguard:latest
    container_name: enclave-wg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
      SERVERURL: "auto"
      SERVERPORT: "51820"
      PEERS: "1"
      PEERDNS: "auto"
      INTERNAL_SUBNET: "10.13.13.0"
      # Routed-VPN model: peers route the internal Docker subnet plus the WG
      # link subnet through the tunnel (mirrors AWS Client VPN giving routes
      # INTO the VPC — not a full-tunnel default route). The 10.13.13.0/24
      # entry is required so peers can reach the gateway's tunnel IP
      # (10.13.13.1) — which they need to query CoreDNS for `app` / `valkey`
      # / etc. resolution. 172.30.0.0/16 matches the `internal` Docker
      # network's fixed CIDR, so peer-side curl to app:8000 routes through
      # the tunnel into internal via gateway's PostUp MASQUERADE.
      ALLOWEDIPS: "10.13.13.0/24, 172.30.0.0/16"
    volumes:
      - ./wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      # Dual-homed: one foot on edge (publishes 51820/udp; the only host-visible
      # surface) + one foot on internal (forwards tunnel traffic to app/data).
      - edge
      - internal

  test-client:
    image: alpine:3.20
    container_name: enclave-test-client
    depends_on:
      app:
        condition: service_healthy
      wg-gateway:
        condition: service_healthy
    # NET_ADMIN is required for `wg-quick up` to create the wg0 interface and
    # add routes. The wg-gateway peer config (peer1.conf) is mounted read-only
    # so smoke.sh can copy + rewrite the Endpoint, then `wg-quick up wg0`.
    cap_add:
      - NET_ADMIN
    volumes:
      - ./test-client:/work:ro
      - ./wireguard/config:/wg-config:ro
    working_dir: /work
    # Edge-only on purpose: test-client has NO direct path to app/worker/data
    # on `internal`. The only way it can reach app:8000 is to bring up the
    # WireGuard tunnel and let the gateway forward into internal — which is
    # exactly the VPN-gated property we want to verify (per ADR-0006 + #13).
    networks:
      - edge
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache curl jq wireguard-tools openresolv iptables iproute2 python3 py3-sympy >/dev/null 2>&1 || true
        exec sleep infinity

networks:
  # Edge: plain bridge. Carries the only host-published port (wg-gateway
  # 51820/udp) and is the only network the test-client sees. From `edge` there
  # is no route to `internal` except through the dual-homed wg-gateway.
  edge:
    driver: bridge
  # Internal: `internal: true` blocks outbound NAT and cross-network bridging.
  # app / worker / data tier sit here and are unreachable from anywhere except
  # the wg-gateway (which is also on this network). Fixed CIDR so the gateway's
  # WireGuard `ALLOWEDIPS = 172.30.0.0/16` matches this subnet — peers route
  # this CIDR through the tunnel (routed-VPN model, mirrors AWS Client VPN).
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/16
